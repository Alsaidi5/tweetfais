<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>tweetfais - النسخة الأصلية المطورة</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        /* التنسيق الأصلي الذي لا يمكن التفريط به */
        @font-face {
            font-family: 'XB Niloofar';
            src: url('https://cdn.jsdelivr.net/gh/Alsaidi5/faisform/XB-NiloofarBd.woff') format('woff');
            font-weight: bold;
        }
        @page { size: A4 landscape; margin: 0; }
        body { margin: 0; padding: 0; background: #f0f2f5; font-family: 'XB Niloofar', sans-serif; }

        .no-print { 
            max-width: 900px; margin: 20px auto; background: white; 
            padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); 
        }
        
        /* إعدادات الترقيم (إضافة جديدة بسيطة) */
        .nav-settings { background: #e0f2f1; padding: 10px; border-radius: 8px; margin: 10px 0; display: flex; gap: 15px; align-items: center; font-size: 14px; }

        /* حاوية التقارير المتسلسلة */
        #main-wrapper { background: #f0f2f5; padding-bottom: 50px; }
        .report-page {
            width: 297mm; height: 210mm; margin: 20px auto; position: relative;
            background: white; box-shadow: 0 0 10px rgba(0,0,0,0.2); page-break-after: always;
        }

        /* الإحداثيات الأصلية (لم تتغير شعرة واحدة) */
        .bg-template { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0; }
        .absolute-text { position: absolute; z-index: 10; font-weight: bold; color: #333; }
        .p-serial { top: 24mm; left: 258mm; font-size: 24pt; color: #fff; width: 20mm; text-align: center; }
        .p-newspaper { top: 46mm; left: 184mm; font-size: 12pt; width: 100mm; text-align: center; color: #fff;}
        .p-date { top: 62mm; left: 197mm; font-size: 14pt; width: 30mm; text-align: center; }
        .img-box { position: absolute; top: 20mm; left: 25mm; width: 120mm; height: 140mm; display: flex; align-items: center; justify-content: center; z-index: 5; }
        .p-img { max-width: 100%; max-height: 100%; object-fit: cover; }

        /* منطقة الترقيم على الصفحة */
        .page-numbering { position: absolute; bottom: 10mm; left: 10mm; font-size: 14pt; z-index: 100; font-weight: bold; }

        @media print {
            .no-print { display: none !important; }
            .report-page { margin: 0 !important; box-shadow: none !important; }
        }
    </style>
</head>
<body>

<div class="no-print">
    <h2>التقرير الرئيسي + إضافة صفحات</h2>
    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;">
        <input type="text" id="serialNum" placeholder="الرقم التسلسلي">
        <input type="text" id="newspaper" placeholder="اسم الحساب">
        <input type="text" id="dateText" placeholder="المتابعون">
        <input type="file" id="imageInput" accept="image/*" style="grid-column: span 3;">
    </div>

    <div class="nav-settings">
        <label>تفعيل الترقيم: <input type="checkbox" id="showNav" checked></label>
        <label>اللون: <input type="color" id="navColor" value="#000000"></label>
    </div>

    <div style="margin-top: 15px; display: flex; gap: 10px;">
        <button onclick="addCurrentForm()" style="flex: 2; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer;">➕ إضافة هذا التقرير</button>
        <button onclick="document.getElementById('importPdf').click()" style="flex: 1; padding: 12px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">📁 استيراد PDF</button>
        <button onclick="window.print()" style="flex: 1; padding: 12px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer;">🖨️ طباعة الكل</button>
        <input type="file" id="importPdf" accept="application/pdf" style="display:none" onchange="importPdfAsPages(this)">
    </div>
</div>

<div id="main-wrapper">
    </div>

<script>
    let currentImgBase64 = "";
    document.getElementById('imageInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => currentImgBase64 = ev.target.result;
        reader.readAsDataURL(e.target.files[0]);
    };

    // الوظيفة الأساسية: إضافة تقرير (نفس كودك الأول)
    function addCurrentForm() {
        const wrapper = document.getElementById('main-wrapper');
        const page = document.createElement('div');
        page.className = 'report-page';
        
        const data = {
            serial: document.getElementById('serialNum').value,
            acc: document.getElementById('newspaper').value,
            fol: document.getElementById('dateText').value,
            img: currentImgBase64
        };

        page.innerHTML = `
            <img src="https://cdn.jsdelivr.net/gh/Alsaidi5/tweetfais@main/template.jpg" class="bg-template">
            <div class="p-serial absolute-text">${data.serial}</div>
            <div class="p-newspaper absolute-text">${data.acc}</div>
            <div class="p-date absolute-text">${data.fol}</div>
            <div class="img-box"><img src="${data.img}" class="p-img"></div>
            <div class="page-numbering"></div>
        `;
        
        wrapper.appendChild(page);
        updateAllNumbers();
    }

    // إضافة جديدة: استيراد PDF حقيقي دون تخريب الجودة
    async function importPdfAsPages(input) {
        const file = input.files[0];
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: arrayBuffer}).promise;
        
        for (let i = 1; i <= pdf.numPages; i++) {
            const pdfPage = await pdf.getPage(i);
            const viewport = pdfPage.getViewport({scale: 2});
            const canvas = document.createElement('canvas');
            canvas.height = viewport.height; canvas.width = viewport.width;
            await pdfPage.render({canvasContext: canvas.getContext('2d'), viewport}).promise;

            const page = document.createElement('div');
            page.className = 'report-page';
            page.innerHTML = `<img src="${canvas.toBase64()}" style="width:100%; height:100%; object-fit:contain;"><div class="page-numbering"></div>`;
            document.getElementById('main-wrapper').appendChild(page);
        }
        updateAllNumbers();
    }

    // تحديث أرقام الصفحات (الجديد)
    function updateAllNumbers() {
        const pages = document.querySelectorAll('.page-numbering');
        const isVisible = document.getElementById('showNav').checked;
        const color = document.getElementById('navColor').value;
        
        pages.forEach((p, index) => {
            p.style.display = isVisible ? 'block' : 'none';
            p.style.color = color;
            p.innerText = `صفحة رقم (${index + 1})`;
        });
    }
</script>
</body>
</html>
