<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام تقارير التغريدات والتحليل - المطور التلقائي</title>
    <style>
        /* [نفس تنسيقات CSS الأصلية الخاصة بكِ دون تغيير لضمان ثبات التصميم] */
        @font-face {
            font-family: 'XB Niloofar';
            src: url('https://cdn.jsdelivr.net/gh/Alsaidi5/faisform/XB-NiloofarBd.woff') format('woff');
            font-weight: bold; font-style: normal; font-display: swap;
        }
        @page { size: A4 landscape; margin: 0; }
        body { margin: 0; padding: 0; background: #e0e0e0; font-family: 'XB Niloofar', 'Arial', sans-serif; }
        .no-print { max-width: 800px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .grid-input { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; }
        button { background: #00796b; color: white; border: none; padding: 15px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; }
        
        #report-page { width: 297mm; height: 210mm; margin: auto; position: relative; background-color: white; overflow: hidden; display: none; }
        .bg-template { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0; }
        .absolute-text, .views-chart-container, #p-link-btn, .img-box { position: absolute; z-index: 10; color: #333; font-weight: bold; }
        
        /* إحداثيات العناصر الأصلية */
        #p-serial { top: 24mm; left: 258mm; font-size: 24pt; color: #fff; width: 20mm; text-align: center; }
        #p-newspaper { top: 46mm; left: 184mm; font-size: 12pt; width: 100mm; text-align: center; color: #fff;}
        #p-date { top: 62mm; left: 197mm; font-size: 14pt; width: 30mm; text-align: center; }
        #p-keywords { top: 89mm; left: 193mm; font-size: 14pt; width: 40mm; height: 14mm; text-align: center; display: flex; align-items: center; justify-content: center; }
        #p-likes { top: 113mm; left: 210mm; font-size: 14pt; color: #000; }
        #p-replies { top: 131mm; left: 210mm; font-size: 14pt; color: #000; }
        #p-text { top: 75mm; right: 63mm; width: 40mm; height: 20mm; font-size: 9pt; line-height: 1.6; text-align:center; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* الرسم البياني */
        .views-chart-container { top: 40mm; left: 154mm; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .progress-bg { width: 15mm; height: 110mm; background: #fff; border: 1px solid #fff; position: relative; }
        .progress-fill { width: 100%; background: #D4A829; position: absolute; bottom: 0; transition: height 0.5s; }
        .axis-numbers { display: flex; flex-direction: column-reverse; justify-content: space-between; height: 110mm; font-size: 4pt; min-width: 45px; }

        /* الرابط المخفي */
        #p-link-btn { top: 142mm; left: 190mm; width: 35mm; height: 15mm; background: rgba(255, 255, 255, 0.01); cursor: pointer; text-decoration: none; }
        
        .img-box { top: 20mm; left: 25mm; width: 120mm; height: 140mm; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #p-img { max-width: 100%; max-height: 100%; object-fit: cover; }

        @media print { .no-print { display: none !important; } #report-page { display: block !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h2>نظام تقارير التغريدات - السحب التلقائي من الجدول</h2>
    <div class="grid-input">
        <div style="grid-column: span 2;">
            <button onclick="fetchLatestData()" style="background: #e67e22;">سحب آخر بيانات من الجدول 🔄</button>
        </div>
        <input type="text" id="serialNum" placeholder="الرقم التسلسلي" oninput="sync()">
        <input type="text" id="newspaper" placeholder="اسم الحساب" oninput="sync()">
        <input type="text" id="dateText" placeholder="المتابعون" oninput="sync()">
        <input type="number" id="likesCount" placeholder="عدد الإعجابات" oninput="sync()">
        <input type="number" id="repliesCount" placeholder="عدد الردود" oninput="sync()">
        <input type="number" id="viewsCount" placeholder="إجمالي المشاهدات" oninput="sync()">
        <textarea id="keywords" placeholder="الهاشتاقات" class="full" oninput="sync()"></textarea>
        <textarea id="fullText" rows="4" placeholder="نص التغريدة" class="full" oninput="sync()"></textarea>
        <input type="url" id="newsLink" placeholder="رابط التغريدة" oninput="sync()">
        <input type="text" id="imageUrlField" placeholder="رابط الصورة المباشر" oninput="sync()">
    </div>
    <button onclick="window.print()">طباعة التقرير PDF 🖨️</button>
</div>

<div id="report-page">
    <img src="https://cdn.jsdelivr.net/gh/Alsaidi5/tweetfais@main/template.jpg" class="bg-template">
    <div id="p-serial" class="absolute-text"></div>
    <div id="p-newspaper" class="absolute-text"></div>
    <div id="p-date" class="absolute-text"></div>
    <div id="p-keywords" class="absolute-text"></div>
    <div id="p-likes" class="absolute-text"></div>
    <div id="p-replies" class="absolute-text"></div>
    <div id="p-text" class="absolute-text"></div>
    <div class="views-chart-container">
        <div class="axis-numbers" id="axis-labels"></div>
        <div class="progress-bg"><div class="progress-fill" id="chart-fill"></div></div>
    </div>
    <a id="p-link-btn" target="_blank"></a>
    <div class="img-box"><img id="p-img" src=""></div>
</div>

<script>
    // وظيفة سحب البيانات من Google Sheets
    function fetchLatestData() {
        google.script.run.withSuccessHandler(function(data) {
            if(data) {
                document.getElementById("serialNum").value = data.serial;
                document.getElementById("newspaper").value = data.account;
                document.getElementById("dateText").value = data.followers;
                document.getElementById("likesCount").value = data.likes;
                document.getElementById("repliesCount").value = data.replies;
                document.getElementById("viewsCount").value = data.views;
                document.getElementById("keywords").value = data.hashtags;
                document.getElementById("fullText").value = data.tweetContent;
                document.getElementById("newsLink").value = data.link;
                document.getElementById("p-img").src = data.imageUrl;
                sync(); // تحديث العرض فور السحب
            }
        }).getLastRowData();
    }

    function sync() {
        document.getElementById("report-page").style.display = "block";
        document.getElementById("p-serial").innerText = document.getElementById("serialNum").value;
        document.getElementById("p-newspaper").innerText = document.getElementById("newspaper").value;
        document.getElementById("p-date").innerText = document.getElementById("dateText").value;
        document.getElementById("p-keywords").innerText = document.getElementById("keywords").value;
        document.getElementById("p-likes").innerText = document.getElementById("likesCount").value;
        document.getElementById("p-replies").innerText = document.getElementById("repliesCount").value;
        
        const textElem = document.getElementById("p-text");
        textElem.innerText = document.getElementById("fullText").value;

        // تحديث الرسم البياني
        let count = parseFloat(document.getElementById("viewsCount").value) || 0;
        updateAxisLabels(count);

        // الرابط المخفي
        let link = document.getElementById("newsLink").value;
        let btn = document.getElementById("p-link-btn");
        if(link && link.trim().startsWith('http')) {
            btn.href = link.trim();
            btn.style.display = "block";
        }
    }

    function updateAxisLabels(target) {
        const axis = document.getElementById("axis-labels");
        axis.innerHTML = ""; 
        let step = target / 10; 
        for (let i = 0; i <= 10; i++) {
            let label = document.createElement("div");
            label.innerText = Math.round(step * i).toLocaleString();
            axis.appendChild(label);
        }
    }
</script>
</body>
</html>
